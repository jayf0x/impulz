<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>impulz demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      gap: 20px;
    }
    h1 { font-size: 1.6rem; letter-spacing: 0.15em; color: #7ee8a2; }
    canvas {
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      display: block;
    }
    #stats {
      display: flex;
      gap: 32px;
      font-size: 0.9rem;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .stat-label { color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .stat-value { font-size: 1.4rem; font-weight: bold; color: #7ee8a2; }
    .stat-value.warn { color: #f0a830; }
    .stat-value.bad  { color: #e05252; }
    #log {
      width: 560px;
      height: 140px;
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.78rem;
      overflow-y: auto;
      color: #aaa;
    }
    .log-line { margin-bottom: 3px; }
    .log-line span { color: #7ee8a2; }
    #hint { font-size: 0.75rem; color: #555; text-align: center; }
  </style>
</head>
<body>
  <h1>⚡ impulz</h1>
  <canvas id="c" width="560" height="320"></canvas>
  <div id="stats">
    <div class="stat"><div class="stat-label">FPS</div><div class="stat-value" id="fps-val">—</div></div>
    <div class="stat"><div class="stat-label">Quality</div><div class="stat-value" id="quality-val">HIGH</div></div>
    <div class="stat"><div class="stat-label">Tab</div><div class="stat-value" id="vis-val">VISIBLE</div></div>
    <div class="stat"><div class="stat-label">Idle</div><div class="stat-value" id="idle-val">—</div></div>
  </div>
  <div id="log"></div>
  <div id="hint">Switch tabs or throttle CPU to see FPS-aware quality switching</div>

  <script type="module">
    // ---------- inlined impulz (no bundler needed for demo) ----------

    function createVisibilityMonitor() {
      const subscribers = new Map();
      let started = false;

      function handleChange() {
        const visible = document.visibilityState === 'visible';
        for (const sub of subscribers.values()) sub.cb(visible);
      }

      return {
        start() {
          if (started) return;
          started = true;
          document.addEventListener('visibilitychange', handleChange);
        },
        stop() {
          if (!started) return;
          started = false;
          document.removeEventListener('visibilitychange', handleChange);
        },
        addSubscriber(id, sub) {
          subscribers.set(id, sub);
          sub.cb(document.visibilityState === 'visible');
        },
        removeSubscriber(id) { subscribers.delete(id); },
        subscriberCount() { return subscribers.size; },
      };
    }

    function createFpsMonitor() {
      const subscribers = new Map();
      let rafHandle = 0;
      let started = false;
      const frameTimes = [];
      let lastEmitTime = 0;

      function tick(now) {
        frameTimes.push(now);
        if (frameTimes.length > 10) frameTimes.shift();

        if (frameTimes.length >= 2 && now - lastEmitTime >= 500) {
          lastEmitTime = now;
          const elapsed = now - frameTimes[0];
          const fps = Math.round(((frameTimes.length - 1) / elapsed) * 1000);
          emit(fps);
        }
        if (started) rafHandle = requestAnimationFrame(tick);
      }

      function emit(fps) {
        for (const sub of subscribers.values()) {
          const opts = sub.options ?? {};
          const meets =
            (opts.below === undefined || fps < opts.below) &&
            (opts.above === undefined || fps > opts.above);

          if (!meets) { sub.conditionMet = false; continue; }
          if (sub.conditionMet && sub.debounceTimer != null) continue;
          sub.conditionMet = true;

          const fire = () => { sub.debounceTimer = undefined; sub.cb(fps); };
          if (opts.debounce > 0) {
            clearTimeout(sub.debounceTimer);
            sub.debounceTimer = setTimeout(fire, opts.debounce);
          } else {
            fire();
          }
        }
      }

      return {
        start() {
          if (started) return;
          started = true;
          frameTimes.length = 0;
          lastEmitTime = 0;
          rafHandle = requestAnimationFrame(tick);
        },
        stop() {
          if (!started) return;
          started = false;
          cancelAnimationFrame(rafHandle);
          for (const sub of subscribers.values()) {
            clearTimeout(sub.debounceTimer);
            sub.conditionMet = false;
          }
        },
        addSubscriber(id, sub) { subscribers.set(id, sub); },
        removeSubscriber(id) {
          const sub = subscribers.get(id);
          if (sub) { clearTimeout(sub.debounceTimer); subscribers.delete(id); }
        },
        subscriberCount() { return subscribers.size; },
      };
    }

    function createIdleMonitor() {
      return
      const subscribers = new Map();
      let started = false;

      function getKey(target) {
        for (const [k, v] of subscribers) if (v === target) return k;
      }

      function scheduleIdle(sub) {
        const timeout = sub.options?.timeout ?? 2000;
        if (typeof window.requestIdleCallback === 'function') {
          sub.handle = window.requestIdleCallback(() => {
            sub.cb();
            if (started && subscribers.has(getKey(sub))) scheduleIdle(sub);
          }, { timeout });
        } else {
          sub.handle = setTimeout(() => {
            sub.cb();
            if (started && subscribers.has(getKey(sub))) scheduleIdle(sub);
          }, timeout);
        }
      }

      function cancelIdle(sub) {
        if (sub.handle == null) return;
        if (typeof window.cancelIdleCallback === 'function')
          window.cancelIdleCallback(sub.handle);
        else clearTimeout(sub.handle);
        sub.handle = undefined;
      }

      return {
        start() {
          if (started) return;
          started = true;
          for (const sub of subscribers.values()) scheduleIdle(sub);
        },
        stop() {
          if (!started) return;
          started = false;
          for (const sub of subscribers.values()) cancelIdle(sub);
        },
        addSubscriber(id, sub) {
          subscribers.set(id, sub);
          if (started) scheduleIdle(sub);
        },
        removeSubscriber(id) {
          const sub = subscribers.get(id);
          if (sub) { cancelIdle(sub); subscribers.delete(id); }
        },
        subscriberCount() { return subscribers.size; },
      };
    }

    function createPulse() {
      const monitors = {
        visibility: createVisibilityMonitor(),
        fps: createFpsMonitor(),
        idle: createIdleMonitor(),
      };
      const subSignals = new Map();

      function addSub(signal, sub) {
        const id = Symbol();
        subSignals.set(id, signal);
        const m = monitors[signal];
        if (m.subscriberCount() === 0) m.start();
        m.addSubscriber(id, sub);
        return () => removeSub(id);
      }

      function removeSub(id) {
        const signal = subSignals.get(id);
        if (!signal) return;
        subSignals.delete(id);
        const m = monitors[signal];
        m.removeSubscriber(id);
        if (m.subscriberCount() === 0) m.stop();
      }

      return {
        on(signal, optionsOrCb, maybeCb) {
          if (signal === 'visibility') return addSub('visibility', { cb: optionsOrCb });
          if (typeof optionsOrCb === 'function') return addSub(signal, { cb: optionsOrCb });
          return addSub(signal, { cb: maybeCb, options: optionsOrCb });
        },
        off(signal) {
          const ids = [...subSignals.entries()]
            .filter(([, s]) => s === signal).map(([id]) => id);
          ids.forEach(removeSub);
        },
        destroy() {
          [...subSignals.keys()].forEach(removeSub);
        },
      };
    }

    // ---------- Demo canvas animation ----------

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let quality = 'high';  // 'high' | 'low' | 'paused'
    let animFrame = 0;
    let running = true;

    const circles = Array.from({ length: 60 }, () => ({
      x: Math.random() * 560,
      y: Math.random() * 320,
      r: 4 + Math.random() * 20,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,
      hue: Math.random() * 360,
    }));

    function drawFrame() {
      if (!running) { animFrame = requestAnimationFrame(drawFrame); return; }

      ctx.clearRect(0, 0, 560, 320);

      const count = quality === 'high' ? circles.length : Math.floor(circles.length / 3);
      const blur  = quality === 'high';

      for (let i = 0; i < count; i++) {
        const c = circles[i];
        c.x += c.vx; c.y += c.vy;
        if (c.x < 0 || c.x > 560) c.vx *= -1;
        if (c.y < 0 || c.y > 320) c.vy *= -1;

        if (blur) {
          ctx.shadowBlur = 18;
          ctx.shadowColor = `hsl(${c.hue},80%,60%)`;
        } else {
          ctx.shadowBlur = 0;
        }

        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${c.hue},${blur ? 75 : 40}%,${blur ? 60 : 40}%)`;
        ctx.fill();
        c.hue = (c.hue + 0.3) % 360;
      }

      // overlay when paused
      if (quality === 'paused') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, 560, 320);
        ctx.fillStyle = '#7ee8a2';
        ctx.font = 'bold 24px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('TAB HIDDEN — paused', 280, 168);
      }

      animFrame = requestAnimationFrame(drawFrame);
    }

    animFrame = requestAnimationFrame(drawFrame);

    // ---------- impulz wiring ----------

    const pulse = createPulse();
    const log   = document.getElementById('log');

    function addLog(msg) {
      const d = new Date();
      const t = d.toLocaleTimeString('en', { hour12: false });
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span>${t}</span> ${msg}`;
      log.prepend(line);
    }

    const fpsEl     = document.getElementById('fps-val');
    const qualityEl = document.getElementById('quality-val');
    const visEl     = document.getElementById('vis-val');
    const idleEl    = document.getElementById('idle-val');

    // Raw FPS display (no threshold)
    pulse.on('fps', (fps) => {
      fpsEl.textContent = fps;
      fpsEl.className = 'stat-value' + (fps < 30 ? ' bad' : fps < 50 ? ' warn' : '');
    });

    // Reduce quality below 30 fps
    pulse.on('fps', { below: 30, debounce: 500 }, (fps) => {
      if (quality !== 'low' && quality !== 'paused') {
        quality = 'low';
        qualityEl.textContent = 'LOW';
        qualityEl.className = 'stat-value bad';
        addLog(`FPS dropped to ${fps} → reduced quality`);
      }
    });

    // Restore quality above 55 fps
    pulse.on('fps', { above: 55, debounce: 1000 }, (fps) => {
      if (quality === 'low') {
        quality = 'high';
        qualityEl.textContent = 'HIGH';
        qualityEl.className = 'stat-value';
        addLog(`FPS recovered to ${fps} → restored quality`);
      }
    });

    // Visibility
    pulse.on('visibility', (visible) => {
      visEl.textContent = visible ? 'VISIBLE' : 'HIDDEN';
      visEl.className = 'stat-value' + (visible ? '' : ' bad');
      if (!visible) {
        quality = 'paused';
        qualityEl.textContent = 'PAUSED';
        qualityEl.className = 'stat-value bad';
        addLog('Tab hidden → animation paused');
      } else {
        quality = 'high';
        qualityEl.textContent = 'HIGH';
        qualityEl.className = 'stat-value';
        addLog('Tab visible → animation resumed');
      }
    });

    // Idle
    pulse.on('idle', { timeout: 3000 }, () => {
      idleEl.textContent = 'YES';
      idleEl.className = 'stat-value warn';
      addLog('Browser idle — could flush analytics');
      setTimeout(() => {
        idleEl.textContent = '—';
        idleEl.className = 'stat-value';
      }, 1200);
    });

    addLog('impulz demo started');
  </script>
</body>
</html>
